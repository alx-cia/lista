/* ── MODERNA · Light theme tokens ── */
:root{
  --bg:          oklch(0.986 0.002 220);
  --bg-2:        oklch(0.966 0.004 216);
  --surface:     oklch(0.999 0.001 220);
  --surface-2:   oklch(0.935 0.060 165);   /* #AFFFDF mint */
  --border:      oklch(0.89 0.007 216);
  --border-soft: oklch(0.93 0.006 216);
  --border-strong: oklch(0.81 0.012 212);
  --text:        oklch(0.31 0.022 222);
  --text-dim:    oklch(0.47 0.022 218);
  --text-muted:  oklch(0.59 0.016 214);
  --text-faint:  oklch(0.72 0.012 212);
  --accent:      oklch(0.63 0.230 13);     /* #FC345C */
  --accent-deep: oklch(0.56 0.215 15);
  --green:       oklch(0.60 0.140 160);
  --red:         oklch(0.55 0.205 22);
  --accent-glow: oklch(0.63 0.230 13 / 0.15);
  --on-accent:   oklch(0.99 0.008 15);
  --term-bg:     oklch(0.16 0.02 145);
  --term-line:   oklch(0.20 0.03 145);
  --crt:         oklch(0.82 0.17 145);
  --display:'Erbaum',-apple-system,system-ui,sans-serif;
  --mono:'Victor Mono',ui-monospace,'SF Mono',Menlo,monospace;
  --r-card:14px; --r-inner:10px; --r-pill:999px;
  --hair:1px solid var(--border);
  --page-glow:   oklch(0.995 0.003 210);
}

/* ── Dark theme (Moderna native: warm near-black + amber accent) ── */
:root[data-theme="dark"]{
  --bg:          oklch(0.15 0.006 70);
  --bg-2:        oklch(0.12 0.006 70);
  --surface:     oklch(0.195 0.006 70);
  --surface-2:   oklch(0.235 0.007 70);
  --border:      oklch(0.31 0.008 70);
  --border-soft: oklch(0.26 0.007 70);
  --border-strong: oklch(0.42 0.010 70);
  --text:        oklch(0.95 0.004 75);
  --text-dim:    oklch(0.74 0.006 75);
  --text-muted:  oklch(0.56 0.007 70);
  --text-faint:  oklch(0.42 0.007 70);
  --accent:      oklch(0.79 0.152 73);
  --accent-deep: oklch(0.72 0.150 65);
  --green:       oklch(0.76 0.165 150);
  --red:         oklch(0.64 0.205 25);
  --accent-glow: oklch(0.79 0.152 73 / 0.18);
  --on-accent:   oklch(0.18 0.02 70);
  --term-bg:     oklch(0.16 0.02 145);
  --term-line:   oklch(0.20 0.03 145);
  --crt:         oklch(0.82 0.17 145);
  --page-glow:   oklch(0.20 0.012 72);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:
    radial-gradient(120% 70% at 50% -10%, var(--page-glow) 0%, transparent 60%),
    var(--bg);
  color:var(--text);
  font-family:var(--mono);
  font-size:15px;font-weight:500;line-height:1.5;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  overscroll-behavior-y:contain;-webkit-touch-callout:none;
}
::selection{background:var(--accent-glow);color:var(--accent-deep)}

.app{max-width:560px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;
  padding:0 1rem calc(2rem + env(safe-area-inset-bottom))}

.label{font-family:var(--display);font-weight:500;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text-dim);display:inline-flex;align-items:center;gap:.5em}
.label svg{width:13px;height:13px;stroke-width:2}

/* ── Header ── */
header{padding:calc(1.4rem + env(safe-area-inset-top)) .25rem .9rem;position:relative}
.eyebrow{font-size:12px;margin-bottom:.55rem}
h1{font-family:var(--display);font-weight:900;font-size:2.6rem;letter-spacing:.01em;line-height:.9;color:var(--text)}
h1 .dot{color:var(--accent)}
/* editable title */
#titleName{display:inline-block;outline:none;border-radius:4px;
  -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;
  min-width:1ch;transition:box-shadow .15s,background .15s}
#titleName[contenteditable="true"]{
  -webkit-user-select:text;user-select:text;cursor:text;
  background:var(--accent-glow);box-shadow:0 2px 0 var(--accent)}
.stats{margin-top:.7rem;display:flex;align-items:baseline;gap:.55rem;
  font-family:var(--display);font-weight:500;font-size:12px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--text-muted)}
.stats b{font-weight:700;font-size:15px;color:var(--text)}
.stats #togo{color:var(--accent)}
.stats #donecount{color:var(--green)}
.stats .sep{color:var(--text-faint)}
.theme-switch{position:absolute;top:calc(1.4rem + env(safe-area-inset-top));right:0;display:flex;gap:2px;
  border:var(--hair);border-radius:var(--r-pill);padding:3px;background:var(--surface)}
.theme-switch button{display:grid;place-items:center;width:30px;height:28px;border:0;border-radius:var(--r-pill);
  background:none;color:var(--text-muted);cursor:pointer;transition:color .15s,background .15s}
.theme-switch button svg{width:15px;height:15px;stroke-width:2}
.theme-switch button.on{color:var(--on-accent);background:var(--accent)}

/* ── Add bar (sticky) ── */
.addbar{position:sticky;top:0;z-index:20;display:flex;gap:.55rem;padding:.7rem 0 .85rem;
  background:linear-gradient(180deg,var(--bg) 72%,transparent);backdrop-filter:saturate(1.2) blur(2px)}
.addbar input{flex:1;min-width:0;font-family:var(--mono);font-weight:500;font-size:16px;
  color:var(--text);background:var(--surface);border:var(--hair);border-radius:var(--r-inner);
  padding:.85rem 1rem;outline:none;transition:border-color .15s,box-shadow .15s}
.addbar input::placeholder{color:var(--text-faint)}
.addbar input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.add-btn{flex:0 0 auto;width:50px;border:0;border-radius:var(--r-inner);background:var(--accent);
  color:var(--on-accent);cursor:pointer;display:grid;place-items:center;
  transition:transform .12s cubic-bezier(.22,1,.36,1),background .15s}
.add-btn:active{transform:translateY(1px)}
.add-btn svg{width:22px;height:22px;stroke-width:2.4}

/* ── List ── */
.list{list-style:none;border:var(--hair);border-radius:var(--r-card);overflow:hidden;background:var(--surface)}
.list:empty{display:none}

/* the row is the swipe stage: surface slides over the action layer beneath */
.row{position:relative;overflow:hidden;min-height:60px;border-bottom:var(--hair);
  transition:transform .36s cubic-bezier(.22,1,.36,1);will-change:transform}
.row:last-child{border-bottom:0}

.row-under{position:absolute;inset:0;display:flex;justify-content:space-between;align-items:stretch}
.under-left{flex:1;display:flex;align-items:center;padding-left:1.2rem;
  background:var(--green);color:#fff;opacity:0;transition:opacity .12s}
.row.swiping-right .under-left{opacity:1}
.under-left svg{width:23px;height:23px;stroke-width:3}
.under-right{flex:0 0 auto;display:flex}
.act-edit,.act-del{width:72px;border:0;display:grid;place-items:center;color:#fff;cursor:pointer}
.act-edit{background:oklch(0.83 0.15 85);color:oklch(0.30 0.06 70)}
.act-del{background:var(--red)}
.act-edit svg,.act-del svg{width:21px;height:21px;stroke-width:2}

.row-surface{position:relative;display:flex;align-items:center;gap:.9rem;min-height:60px;
  padding:.7rem 1rem;background:var(--surface);cursor:pointer;
  user-select:none;-webkit-user-select:none;touch-action:pan-y;will-change:transform;
  transition:transform .28s cubic-bezier(.22,1,.36,1)}
.row.done .row-surface{background:color-mix(in oklch,var(--surface),var(--bg-2) 60%)}

.row .check{flex:0 0 auto;width:26px;height:26px;border-radius:50%;border:2px solid var(--border-strong);
  display:grid;place-items:center;color:#fff;transition:background .18s,border-color .18s}
.row .check svg{width:15px;height:15px;stroke-width:3;opacity:0;transition:opacity .15s}
.row .text{flex:1;min-width:0;font-family:var(--mono);font-size:16px;font-weight:500;color:var(--text);
  word-break:break-word;line-height:1.35;transition:color .18s}
.row.done .check{background:var(--green);border-color:var(--green)}
.row.done .check svg{opacity:1}
.row.done .text{color:var(--text-faint);text-decoration:line-through;text-decoration-color:var(--text-faint)}

@keyframes pop{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.row.fresh{animation:pop .28s cubic-bezier(.22,1,.36,1)}

/* edit mode */
.row.editing .row-surface{cursor:default;transform:none!important}
.row .edit-input{flex:1;min-width:0;font-family:var(--mono);font-size:16px;font-weight:500;color:var(--text);
  background:transparent;border:0;outline:none;padding:0;line-height:1.35}
.row-del-inline{flex:0 0 auto;width:38px;height:38px;border:0;background:transparent;border-radius:var(--r-inner);
  color:var(--red);cursor:pointer;display:grid;place-items:center}
.row-del-inline:active{background:color-mix(in oklch,var(--red),transparent 88%)}
.row-del-inline svg{width:19px;height:19px;stroke-width:2}

/* ── Done divider ── */
.divider{list-style:none;display:flex;align-items:center;gap:.8rem;padding:1.4rem .25rem .6rem}
.divider .dlabel{font-family:var(--display);font-weight:500;font-size:11px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--text-muted);white-space:nowrap}
.divider .dlabel b{color:var(--green);font-weight:700}
.divider .dline{flex:1;border-top:1px dotted var(--border-strong)}
.clear-btn{border:0;background:transparent;font-family:var(--mono);font-weight:600;font-size:11px;
  letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);cursor:pointer;
  display:inline-flex;align-items:center;gap:.4em;padding:.3rem .1rem}
.clear-btn:active{color:var(--red)}
.clear-btn svg{width:13px;height:13px;stroke-width:2}

/* ── Empty state — Moderna CRT terminal ── */
.empty{margin-top:1.5rem;display:none}
.empty.show{display:block;animation:pop .35s ease}
.term{border:1px solid color-mix(in oklch,var(--crt),transparent 55%);border-radius:var(--r-inner);
  background:repeating-linear-gradient(0deg,color-mix(in oklch,var(--term-line),transparent 75%) 0 2px,transparent 2px 4px),var(--term-bg);
  padding:1.1rem 1.15rem;font-family:var(--mono);font-size:13px;color:var(--crt);
  text-shadow:0 0 8px color-mix(in oklch,var(--crt),transparent 50%);line-height:1.7}
.term .tbar{display:flex;justify-content:space-between;color:color-mix(in oklch,var(--crt),transparent 25%);
  letter-spacing:.1em;border-bottom:1px solid color-mix(in oklch,var(--crt),transparent 70%);
  padding-bottom:.5rem;margin-bottom:.7rem}
.term .dim{color:color-mix(in oklch,var(--crt),transparent 45%)}
.term .blink{animation:blink 1.1s steps(2,start) infinite}
@keyframes blink{50%{opacity:0}}

/* ── Footer hint ── */
.hint{margin-top:auto;padding-top:1.6rem;text-align:center;font-family:var(--display);font-weight:500;
  font-size:10.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--text-faint);line-height:1.8}

@media (prefers-reduced-motion:reduce){
  .row,.row-surface{transition:none}
  .row.fresh,.empty.show{animation:none}
  .term .blink{animation:none}
}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="theme-switch" id="themeSwitch" role="group" aria-label="Theme">
      <button type="button" data-theme-set="auto" aria-label="Match system theme" title="Auto"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 0 0 0 18Z" fill="currentColor" stroke="none"/></svg></button>
      <button type="button" data-theme-set="light" aria-label="Light theme" title="Light"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg></button>
      <button type="button" data-theme-set="dark" aria-label="Dark theme" title="Dark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg></button>
    </div>
    <span class="label eyebrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg> SHOPPING LIST</span>
    <h1 id="title"><span id="titleName" autocapitalize="words" spellcheck="false">Lista</span><span class="dot">.</span></h1>
    <div class="stats">
      <span><b id="togo">0</b> To go</span>
      <span class="sep">·</span>
      <span><b id="donecount">0</b> Done</span>
    </div>
  </header>

  <form class="addbar" id="addForm">
    <input id="addInput" type="text" inputmode="text" placeholder="Add an item…"
           autocomplete="off" autocorrect="off" autocapitalize="words" enterkeyhint="done" spellcheck="false">
    <button class="add-btn" type="submit" aria-label="Add item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
    </button>
  </form>

  <ul class="list" id="list"></ul>

  <div class="empty" id="empty">
    <div class="term">
      <div class="tbar"><span>LISTA :: READY</span><span>00 ITEMS</span></div>
      <div>&gt; list is empty<span class="blink">_</span></div>
      <div class="dim" style="margin-top:.4rem">type above to add your first item</div>
    </div>
  </div>

  <p class="hint">Tap or swipe right to check<br>Swipe left to edit or delete</p>
</div>

<script>
"use strict";
const KEY = "moderna.lista.v1";
const ICON = {
  check:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
  trash:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>',
  pencil: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>',
  eraser: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="m7 21-4.3-4.3a1 1 0 0 1 0-1.4l9.6-9.6a1 1 0 0 1 1.4 0l5.6 5.6a1 1 0 0 1 0 1.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>',
};

let state = load();
const listEl  = document.getElementById("list");
const emptyEl = document.getElementById("empty");
const togoEl  = document.getElementById("togo");
const doneEl  = document.getElementById("donecount");
const reduceMotion = matchMedia("(prefers-reduced-motion:reduce)").matches;
let editingId = null;
let freshId   = null;

function load(){
  try{ const s = JSON.parse(localStorage.getItem(KEY));
    if(s && Array.isArray(s.items)) return {items:s.items, seq:s.seq||s.items.length, title:s.title||"", theme:s.theme||"auto"};
  }catch(e){}
  return {items:[], seq:0, title:"", theme:"auto"};
}
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){} }

// unchecked on top (newest activity first), checked below (newest check first)
function ordered(){
  const open = state.items.filter(i=>!i.done).sort((a,b)=>b.act-a.act);
  const done = state.items.filter(i=> i.done).sort((a,b)=>b.act-a.act);
  return {open, done};
}
const esc = s => s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

/* ── Editable title (long-press to rename, persisted) ── */
const titleEl = document.getElementById("title");
const titleNameEl = document.getElementById("titleName");
function applyTitle(){ const t = state.title || "Lista"; titleNameEl.textContent = t; document.title = t; }
applyTitle();

// ── Theme: auto (match iOS) / light / dark, persisted ──
const themeMq = matchMedia("(prefers-color-scheme: dark)");
const themeMeta = document.querySelector('meta[name="theme-color"]');
function effTheme(){ const t = state.theme || "auto"; return t==="auto" ? (themeMq.matches?"dark":"light") : t; }
function applyTheme(){
  const eff = effTheme();
  document.documentElement.setAttribute("data-theme", eff);
  if(themeMeta) themeMeta.setAttribute("content", eff==="dark" ? "#1b1a18" : "#FBFDFC");
  document.querySelectorAll("#themeSwitch [data-theme-set]").forEach(b=>{
    b.classList.toggle("on", b.dataset.themeSet === (state.theme||"auto"));
  });
}
applyTheme();
document.getElementById("themeSwitch").addEventListener("click", e=>{
  const b = e.target.closest("[data-theme-set]"); if(!b) return;
  state.theme = b.dataset.themeSet; save(); applyTheme();
});
themeMq.addEventListener("change", ()=>{ if((state.theme||"auto")==="auto") applyTheme(); });

let tTimer=null, tStart=null;
function endTitlePress(){ if(tTimer){ clearTimeout(tTimer); tTimer=null; } tStart=null; }
titleEl.addEventListener("pointerdown", e=>{
  if(titleNameEl.isContentEditable) return;
  if(e.pointerType==="mouse" && e.button!==0) return;
  tStart={x:e.clientX,y:e.clientY};
  tTimer=setTimeout(startTitleEdit, 480);
});
titleEl.addEventListener("pointermove", e=>{
  if(!tStart) return;
  if(Math.abs(e.clientX-tStart.x)>10 || Math.abs(e.clientY-tStart.y)>10) endTitlePress();
});
titleEl.addEventListener("pointerup", endTitlePress);
titleEl.addEventListener("pointercancel", endTitlePress);
function startTitleEdit(){
  endTitlePress();
  titleNameEl.contentEditable = "true";
  titleNameEl.focus();
  const r=document.createRange(); r.selectNodeContents(titleNameEl);
  const sel=getSelection(); sel.removeAllRanges(); sel.addRange(r);
}
titleNameEl.addEventListener("keydown", e=>{
  if(e.key==="Enter"){ e.preventDefault(); titleNameEl.blur(); }
  else if(e.key==="Escape"){ e.preventDefault(); applyTitle(); titleNameEl.blur(); }
});
titleNameEl.addEventListener("blur", ()=>{
  if(!titleNameEl.isContentEditable) return;
  titleNameEl.contentEditable = "false";
  const v = titleNameEl.textContent.replace(/\s+/g," ").trim().slice(0,40);
  state.title = (v.toLowerCase()==="lista") ? "" : v;   // store empty for the default
  save(); applyTitle();
});

/* ── Rows ── */
function rowHTML(it){
  if(it.id === editingId){
    return `<li class="row editing" data-id="${it.id}">
      <div class="row-surface">
        <span class="check">${it.done?ICON.check:""}</span>
        <input class="edit-input" type="text" autocomplete="off" autocapitalize="words" autocorrect="off" spellcheck="false" enterkeyhint="done" value="${esc(it.text)}">
        <button class="row-del-inline" data-act="del" aria-label="Delete item">${ICON.trash}</button>
      </div>
    </li>`;
  }
  return `<li class="row${it.done?" done":""}${it.id===freshId?" fresh":""}" data-id="${it.id}">
    <div class="row-under" aria-hidden="true">
      <div class="under-left">${ICON.check}</div>
      <div class="under-right">
        <button class="act-edit" data-act="edit" aria-label="Edit item">${ICON.pencil}</button>
        <button class="act-del"  data-act="del"  aria-label="Delete item">${ICON.trash}</button>
      </div>
    </div>
    <div class="row-surface">
      <span class="check">${ICON.check}</span>
      <span class="text">${esc(it.text)}</span>
    </div>
  </li>`;
}

function render(animate){
  openId = null;                       // DOM rebuild closes any open swipe
  const {open, done} = ordered();
  let first = null;
  if(animate && !reduceMotion){
    first = {};
    listEl.querySelectorAll(".row").forEach(r=>{ first[r.dataset.id] = r.getBoundingClientRect().top; });
  }
  let html = open.map(rowHTML).join("");
  if(done.length){
    html += `<li class="divider"><span class="dlabel">Done · <b>${done.length}</b></span><span class="dline"></span><button class="clear-btn" data-act="clear">${ICON.eraser} Clear</button></li>`;
    html += done.map(rowHTML).join("");
  }
  listEl.innerHTML = html;

  togoEl.textContent = open.length;
  doneEl.textContent = done.length;
  emptyEl.classList.toggle("show", state.items.length === 0);

  if(first){
    const rows = listEl.querySelectorAll(".row");
    rows.forEach(r=>{ const f=first[r.dataset.id]; if(f==null) return;
      const dy=f-r.getBoundingClientRect().top;
      if(dy){ r.style.transition="none"; r.style.transform=`translateY(${dy}px)`; } });
    requestAnimationFrame(()=>{ rows.forEach(r=>{ r.style.transition=""; r.style.transform=""; }); });
  }
  if(editingId){
    const inp = listEl.querySelector(".edit-input");
    if(inp){ inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
  }
  freshId = null;
}

// ── Mutations ──
function addItem(text){
  text = text.trim(); if(!text) return;
  const it = {id:(Date.now().toString(36)+Math.random().toString(36).slice(2,6)), text, done:false, act:++state.seq};
  state.items.push(it); freshId = it.id; save(); render(false);
}
function toggle(id){
  const it = state.items.find(i=>i.id===id); if(!it) return;
  it.done = !it.done; it.act = ++state.seq;   // unchecked→top of open, checked→top of done
  save(); render(true);
}
function commitEdit(id, val){
  const it = state.items.find(i=>i.id===id); editingId = null;
  if(!it){ render(false); return; }
  val = val.trim();
  if(val) it.text = val; else state.items = state.items.filter(i=>i.id!==id);
  save(); render(false);
}
function remove(id){ state.items = state.items.filter(i=>i.id!==id); editingId=null; save(); render(false); }
function clearDone(){ state.items = state.items.filter(i=>!i.done); save(); render(true); }

// ── Add form ──
const addForm = document.getElementById("addForm");
const addInput = document.getElementById("addInput");
addForm.addEventListener("submit", e=>{ e.preventDefault(); addItem(addInput.value); addInput.value=""; addInput.focus(); });

// ── Swipe engine: tap / swipe-right = toggle · swipe-left = reveal actions · vertical = scroll ──
const TRAY = 144, AXIS_LOCK = 8, RIGHT_TOGGLE = 64;
let drag = null, openId = null;

function closeOpen(exceptId){
  if(openId == null || openId === exceptId) return;
  const s = listEl.querySelector(`.row[data-id="${openId}"] .row-surface`);
  if(s){ s.style.transition = ""; s.style.transform = "translateX(0)"; }
  openId = null;
}

listEl.addEventListener("pointerdown", e=>{
  const surface = e.target.closest(".row-surface");
  if(!surface) return;                                   // action buttons fall through to click
  const row = surface.closest(".row");
  if(row.classList.contains("editing")) return;
  if(e.pointerType==="mouse" && e.button!==0) return;
  drag = {id:row.dataset.id, row, surface, startX:e.clientX, startY:e.clientY,
          base:(openId===row.dataset.id?-TRAY:0), axis:null, off:0};
});
listEl.addEventListener("pointermove", e=>{
  if(!drag) return;
  const dx = e.clientX-drag.startX, dy = e.clientY-drag.startY;
  if(!drag.axis){
    if(Math.abs(dx)<AXIS_LOCK && Math.abs(dy)<AXIS_LOCK) return;
    drag.axis = Math.abs(dx)>Math.abs(dy) ? "x" : "y";
    if(drag.axis==="y"){ drag=null; return; }            // vertical → native scroll
    drag.surface.style.transition = "none";
    closeOpen(drag.id);
  }
  if(drag.axis==="x"){
    const off = Math.max(-TRAY, Math.min(TRAY, drag.base+dx));
    drag.off = off;
    drag.surface.style.transform = `translateX(${off}px)`;
    drag.row.classList.toggle("swiping-right", off>4);
  }
});
function endDrag(){
  if(!drag) return;
  const d = drag; drag = null;
  d.row.classList.remove("swiping-right");
  if(d.axis === "x"){
    d.surface.style.transition = "";
    if(d.base===0 && d.off>RIGHT_TOGGLE){                 // swipe-right → toggle
      d.surface.style.transform = "translateX(0)";
      toggle(d.id);
    } else if(d.off <= -TRAY/2){                          // settle open (reveal actions)
      d.surface.style.transform = `translateX(${-TRAY}px)`;
      openId = d.id;
    } else {                                              // settle closed
      d.surface.style.transform = "translateX(0)";
      if(openId===d.id) openId = null;
    }
  } else {                                                // a tap
    if(openId===d.id) closeOpen();                        // tap an open row → close
    else { closeOpen(); toggle(d.id); }
  }
}
listEl.addEventListener("pointerup", endDrag);
listEl.addEventListener("pointercancel", ()=>{
  if(!drag) return; const d=drag; drag=null;
  d.row.classList.remove("swiping-right");
  d.surface.style.transition=""; d.surface.style.transform = openId===d.id?`translateX(${-TRAY}px)`:"translateX(0)";
});

// ── Action buttons + divider (delegated click) ──
listEl.addEventListener("click", e=>{
  const act = e.target.closest("[data-act]");
  if(!act) return;
  const v = act.dataset.act;
  if(v==="clear"){ clearDone(); return; }
  const row = act.closest(".row"); if(!row) return;
  if(v==="del")  remove(row.dataset.id);
  if(v==="edit"){ editingId = row.dataset.id; render(false); }
});
listEl.addEventListener("keydown", e=>{
  if(!e.target.classList.contains("edit-input")) return;
  if(e.key==="Enter"){ e.preventDefault(); e.target.blur(); }
  else if(e.key==="Escape"){ editingId=null; render(false); }
});
listEl.addEventListener("focusout", e=>{
  if(!e.target.classList.contains("edit-input")) return;
  if(e.relatedTarget && e.relatedTarget.closest && e.relatedTarget.closest(".row-del-inline")) return;
  const row = e.target.closest(".row");
  if(row && editingId) commitEdit(row.dataset.id, e.target.value);
});

render(false);

// ── Service worker: full offline (registers sw.js when deployed; no-op locally) ──
if("serviceWorker" in navigator){
  addEventListener("load", ()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); });
}
</script>
</body>
</html>
